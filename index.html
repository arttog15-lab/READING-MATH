<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learn Math/Reading - Portal</title>
    <link rel="icon" href="https://www.google.com">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; background: #fff; overflow: hidden; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #app { text-align: center; border: 1px solid #eee; padding: 50px; border-radius: 8px; width: 400px; }
        button { background: #3498db; color: #fff; border: none; padding: 12px; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold; margin: 5px 0; }
        #cloak { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; background: #000; z-index: 2147483647; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="app">
        <h2>Learn Math/Reading</h2>
        <p style="color:#999; font-size: 0.8em;">Secure Academic Session v9.2</p>
        <button onclick="xExecute('68747470733a2f2f77696e646f777339362e6e6574')">Math Module 1</button>
        <button onclick="xExecute('68747470733a2f2f7777772e77696b6970656469612e6f7267')">Reading Module 2</button>
    </div>

    <div id="cloak"></div>

    <script>
        // Converts Hex strings back to URLs only inside the local execution scope
        function hex2a(hex) {
            var str = '';
            for (var i = 0; i < hex.length; i += 2) str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            return str;
        }

        (function() {
            window.xExecute = function(payload) {
                const target = hex2a(payload);
                
                // 1. Instant Tab Camouflage
                document.title = "Google Docs";
                document.documentElement.requestFullscreen();

                // 2. Hide UI
                document.getElementById('app').style.display = 'none';
                const c = document.getElementById('cloak');
                c.style.display = 'block';

                // 3. Data-URI Injection inside a Closed Shadow Root
                // This avoids using 'Blob' or 'Iframe src' keywords in the cleartext
                const root = c.attachShadow({mode: 'closed'});
                const container = document.createElement('div');
                
                const secretPayload = `
                    <style>body,html{margin:0;padding:0;height:100vh;overflow:hidden;}</style>
                    <iframe src="${target}" style="width:100vw;height:100vh;border:none;" allow="autoplay; fullscreen; keyboard"></iframe>
                `;

                // Base64 encoding the frame wrapper itself
                const encodedData = "data:text/html;base64," + btoa(secretPayload);
                
                const frame = document.createElement('iframe');
                frame.src = encodedData;
                frame.style.width = "100vw";
                frame.style.height = "100vh";
                frame.style.border = "none";
                
                root.appendChild(frame);
            };
        })();

        // Double Escape Panic Switch
        let p = 0;
        window.onkeydown = (e) => { if(e.key === 'Escape') { p++; if(p>=2) location.reload(); } }
    </script>
