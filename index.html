<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="tab-title">Learn Math/Reading - Student Portal</title>
    <link rel="icon" href="https://www.google.com">
    <style>
        body, html { margin: 0; padding: 0; height: 100vh; background: #f0f2f5; color: #333; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #ui { text-align: center; border: 1px solid #ddd; padding: 30px; background: #fff; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 500px; z-index: 100; }
        h1 { color: #2c3e50; font-size: 1.4em; margin-bottom: 15px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .section-label { font-size: 0.7em; color: #95a5a6; text-transform: uppercase; margin: 10px 0 5px; text-align: left; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        input { background: #f9f9f9; border: 1px solid #ccc; padding: 10px; width: 100%; box-sizing: border-box; border-radius: 5px; margin-bottom: 10px; outline: none; }
        button { background: #3498db; color: #fff; border: none; padding: 8px; cursor: pointer; font-weight: 600; border-radius: 5px; font-size: 0.8em; transition: 0.2s; }
        button:hover { background: #2980b9; transform: scale(1.02); }
        .special { background: #27ae60; }
        #host { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; z-index: 999; background: #000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui">
        <h1>Academic Module Selection</h1>
        
        <div class="section-label">Mathematics & Logic</div>
        <div class="grid">
            <button onclick="boot('https://windows96.net')">Windows 96</button>
            <button onclick="boot('https://www.mathplayground.com')">Math Games</button>
            <button onclick="boot('https://poki.com')">Slope Logic</button>
        </div>

        <div class="section-label">Reading & Research</div>
        <div class="grid">
            <button onclick="boot('https://www.wikipedia.org')">Wiki Lab</button>
            <button onclick="boot('https://archive.org')">History Lib</button>
            <button onclick="boot('https://www.gutenberg.org')">Classic Lit</button>
        </div>

        <div class="section-label">Interactive Modules</div>
        <div class="grid">
            <button onclick="boot('https://classic.minecraft.net')">Minecraft JS</button>
            <button onclick="boot('https://www.chess.com')">Chess AI</button>
            <button onclick="boot('https://isbhack.github.io')">GBA Emulator</button>
        </div>

        <input type="text" id="target" placeholder="Paste custom module URL...">
        <button onclick="boot(document.getElementById('target').value)" style="width:100%;" class="special">LAUNCH CUSTOM COMPONENT</button>
        
        <p style="font-size: 0.6em; color: #bdc3c7; margin-top: 10px;">Double ESC to clear session history</p>
    </div>

    <div id="host"></div>

    <script>
        function boot(url) {
            if (!url) return;
            let target = url;

            // 1. FORMAT FIXER
            if (target.includes('://youtube.com')) target = target.replace('watch?v=', 'embed/');
            if (!target.includes('://')) target = 'https://' + target;

            // 2. DISGUISE
            document.title = "Google Docs - Academic Paper";
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            // 3. UI SWAP
            document.getElementById('ui').style.display = 'none';
            const hostDiv = document.getElementById('host');
            hostDiv.style.display = 'block';

            // 4. CLOSED SHADOW DOM (Blinds most extensions)
            const shadow = hostDiv.attachShadow({mode: 'closed'});
            const ifr = document.createElement('iframe');
            
            // Randomize the internal ID so your extension can't find a pattern
            ifr.id = "module_" + Math.random().toString(36).substring(7);
            ifr.src = target;
            ifr.setAttribute('style', 'width:100vw;height:100vh;border:none;');
            ifr.setAttribute('allow', 'autoplay; fullscreen; keyboard; gamepad');
            
            shadow.appendChild(ifr);
        }

        // 5. PANIC KEY
        let escCount = 0;
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                escCount++;
                if (escCount >= 2) {
                    location.reload(); 
                }
            }
        });
    </script>
</body>
</html>
